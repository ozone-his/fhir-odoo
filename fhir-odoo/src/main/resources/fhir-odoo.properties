# The URL of the Odoo server to connect to, including the protocol (http or https)
# For example: http://localhost or https://odoo.example.com
fhir.odoo.host=${ODOO_HOST:http://localhost}

# The port of the Odoo server
fhir.odoo.port=${ODOO_PORT:8069}

# The name of the database to connect to on the Odoo server
fhir.odoo.database=${ODOO_DATABASE:odoo}

# Redis connection used for distributed locking
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ---------------------------------------------------------------------------
# Distributed lock subsystem — Redis
# ---------------------------------------------------------------------------

# Master switch. Set to false to disable Redis locking entirely (e.g. in environments without Redis).
fhir.odoo.lock.redis.enabled=${FHIR_ODOO_LOCK_REDIS_ENABLED:false}

# Startup: how long to wait for Redis before aborting application boot (ms).
fhir.odoo.lock.redis.startup.max-wait-ms=${FHIR_ODOO_LOCK_REDIS_STARTUP_MAX_WAIT_MS:60000}

# Health probe: interval between consecutive Redis PING probes (ms).
fhir.odoo.lock.redis.health.probe-interval-ms=${FHIR_ODOO_LOCK_REDIS_HEALTH_PROBE_INTERVAL_MS:5000}

# Health probe: how often to emit a WARN log while Redis remains continuously unreachable (ms).
fhir.odoo.lock.redis.health.periodic-warn-interval-ms=${FHIR_ODOO_LOCK_REDIS_HEALTH_PERIODIC_WARN_INTERVAL_MS:30000}

# Default purpose profile — used as fallback when no purpose-specific override exists.
fhir.odoo.lock.redis.defaults.key-prefix=${FHIR_ODOO_LOCK_REDIS_DEFAULT_KEY_PREFIX:fhir-odoo:lock}
fhir.odoo.lock.redis.defaults.wait-timeout-ms=${FHIR_ODOO_LOCK_REDIS_DEFAULT_WAIT_TIMEOUT_MS:5000}
fhir.odoo.lock.redis.defaults.lease-duration-ms=${FHIR_ODOO_LOCK_REDIS_DEFAULT_LEASE_DURATION_MS:30000}
fhir.odoo.lock.redis.defaults.retry-interval-ms=${FHIR_ODOO_LOCK_REDIS_DEFAULT_RETRY_INTERVAL_MS:100}

# SERVICE_REQUEST_REQUISITION purpose override — serializes concurrent SaleOrder creation per requisition.
# Only fields that differ from the defaults need to be specified.
fhir.odoo.lock.redis.purposes[SERVICE_REQUEST_REQUISITION].key-prefix=${FHIR_ODOO_LOCK_REDIS_SR_KEY_PREFIX:fhir-odoo:service-request}

odoo.partner.dob.field=${ODOO_PARTNER_DOB_FIELD:x_customer_dob}
odoo.partner.id.field=${ODOO_PARTNER_ID_FIELD:x_external_identifier}
odoo.partner.weight.field=${ODOO_PARTNER_WEIGHT_FIELD:x_customer_weight}
